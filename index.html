<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manta</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #add3d8; /* Coastal fog color */
            font-family: 'Courier New', Courier, monospace; 
        }

        #title-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff; /* Dark intro */
            color: #1e1d1d;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 999;
            transition: opacity 2s ease-out; 
            cursor: pointer;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            letter-spacing: 5px;
            text-transform: uppercase;
        }

        p {
            font-size: 1.1rem;
            max-width: 600px;
            color: #504f4f;
            line-height: 1.6;
            margin-bottom: 40px;
        }

        .click-instruction {
            font-size: 0.9rem;
            color: #555;
            margin-top: 50px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }

        .hidden {
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="title-screen">
        <p>Forward Operating Location</p>
        <p>
            Manta, Ecuador<br><br>
            
        </p>
        <div class="click-instruction">[ CLICK TO ENTER ]</div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script type="module" src="./main.js"></script>

</body>
</html>
